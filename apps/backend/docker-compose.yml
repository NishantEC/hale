services:
  noop-db:
    image: timescale/timescaledb:latest-pg16
    container_name: noop-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: noop
      POSTGRES_PASSWORD: noop_dev
      POSTGRES_DB: noop
    ports:
      - '5434:5432'
    volumes:
      - noop_pgdata:/var/lib/postgresql/data

volumes:
  noop_pgdata:
