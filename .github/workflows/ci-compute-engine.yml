name: CI compute-engine
on:
  pull_request:
    paths:
      - 'apps/compute-engine/**'
      - 'apps/backend/.fixtures/compute-engine-golden/**'
      - '.github/workflows/ci-compute-engine.yml'
      - 'pnpm-lock.yaml'
  push:
    branches: [main]
    paths:
      - 'apps/compute-engine/**'
      - 'apps/backend/.fixtures/compute-engine-golden/**'
      - '.github/workflows/ci-compute-engine.yml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: ci-compute-engine-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/compute-engine
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/compute-engine
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/compute-engine
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cd apps/compute-engine && cargo audit --deny warnings --ignore RUSTSEC-2023-0071

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: apps/compute-engine
          push: false
          tags: noop-compute-engine:ci
          cache-from: type=gha,scope=ce-docker
          cache-to: type=gha,mode=max,scope=ce-docker

  fixture-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: npx tsx apps/backend/scripts/check-fixtures.ts
