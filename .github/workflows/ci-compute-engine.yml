name: CI compute-engine
on:
  pull_request:
    paths:
      - 'apps/compute-engine/**'
      - 'apps/backend/.fixtures/compute-engine-golden/**'
      - '.github/workflows/ci-compute-engine.yml'
      - 'pnpm-lock.yaml'
  push:
    branches: [main]
    paths:
      - 'apps/compute-engine/**'
      - 'apps/backend/.fixtures/compute-engine-golden/**'
      - '.github/workflows/ci-compute-engine.yml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/compute-engine
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/compute-engine
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/compute-engine
      - run: cargo install cargo-audit --locked
      - run: cd apps/compute-engine && cargo audit --deny warnings

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t noop-compute-engine:ci apps/compute-engine

  fixture-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: npx tsx apps/backend/scripts/check-fixtures.ts
