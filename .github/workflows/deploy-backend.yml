name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  PROJECT_ID: flashckard
  REGION: us-central1
  SERVICE: noop-backend
  REGISTRY: us-central1-docker.pkg.dev/flashckard/noop
  CLOUDSQL_INSTANCE: flashckard:us-central1:noop-db

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: "access_token"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Run TypeORM migrations
        run: |
          # Apply any pending TypeORM migrations (entities under apps/backend/src/**)
          # before the service revision rolls out. Idempotent — already-applied
          # migrations are skipped by the typeorm_migrations table.
          gcloud run jobs deploy noop-typeorm-migrate \
            --image=${{ env.REGISTRY }}/backend:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --service-account=noop-cloud-run@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars=NODE_ENV=production,INSTANCE_CONNECTION_NAME=${{ env.CLOUDSQL_INSTANCE }} \
            --set-secrets=DB_USER=NOOP_DB_USER:latest,DB_PASSWORD=NOOP_DB_PASSWORD:latest,DB_NAME=NOOP_DB_NAME:latest \
            --set-cloudsql-instances=${{ env.CLOUDSQL_INSTANCE }} \
            --command=node \
            --args=node_modules/typeorm/cli.js,migration:run,-d,apps/backend/dist/typeorm.datasource.js \
            --max-retries=0 \
            --task-timeout=5m \
            --quiet

          gcloud run jobs execute noop-typeorm-migrate \
            --region=${{ env.REGION }} \
            --wait

      - name: Run better-auth migrations
        run: |
          gcloud run jobs deploy noop-better-auth-migrate \
            --image=${{ env.REGISTRY }}/backend:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --service-account=noop-cloud-run@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars=NODE_ENV=production,INSTANCE_CONNECTION_NAME=${{ env.CLOUDSQL_INSTANCE }},BETTER_AUTH_URL=https://api.noop.enform.co \
            --set-secrets=DB_USER=NOOP_DB_USER:latest,DB_PASSWORD=NOOP_DB_PASSWORD:latest,DB_NAME=NOOP_DB_NAME:latest,BETTER_AUTH_SECRET=NOOP_JWT_SECRET:latest \
            --set-cloudsql-instances=${{ env.CLOUDSQL_INSTANCE }} \
            --command=node \
            --args=node_modules/@better-auth/cli/dist/index.mjs,migrate,--cwd,apps/backend,--config,dist/auth/auth.js,-y \
            --max-retries=0 \
            --task-timeout=5m \
            --quiet

          gcloud run jobs execute noop-better-auth-migrate \
            --region=${{ env.REGION }} \
            --wait

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/backend:${{ github.sha }}
          env_vars: |-
            NODE_ENV=production
            INSTANCE_CONNECTION_NAME=${{ env.CLOUDSQL_INSTANCE }}
            BETTER_AUTH_URL=https://api.noop.enform.co
            BETTER_AUTH_TRUSTED_ORIGINS=https://noop.enform.co
            DEBUG_INSPECTOR_ENABLED=true
            DEBUG_ADMIN_EMAILS=guptanishant1307@gmail.com,nish@example.com
            COMPUTE_ENGINE_ENABLED=true
            COMPUTE_ENGINE_URL=https://noop-compute-engine-z7lfiw76rq-uc.a.run.app
            PIPELINE_WORKER_URL=https://noop-pipeline-worker-z7lfiw76rq-uc.a.run.app
          flags: |
            --set-cloudsql-instances=${{ env.CLOUDSQL_INSTANCE }}
            --set-secrets=DB_USER=NOOP_DB_USER:latest,DB_PASSWORD=NOOP_DB_PASSWORD:latest,DB_NAME=NOOP_DB_NAME:latest,BETTER_AUTH_SECRET=NOOP_JWT_SECRET:latest
            --service-account=noop-cloud-run@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
            --min-instances=1
            --max-instances=20
            --memory=8Gi
            --cpu=2
            --concurrency=10
            --timeout=1800
            --allow-unauthenticated

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "::notice title=Backend Deployed::$URL"
