name: Deploy Pipeline Worker

on:
  push:
    tags:
      - "worker-v*"
  workflow_dispatch:

env:
  PROJECT_ID: flashckard
  REGION: us-central1
  SERVICE: noop-pipeline-worker
  REGISTRY: us-central1-docker.pkg.dev/flashckard/noop
  CLOUDSQL_INSTANCE: flashckard:us-central1:noop-db

concurrency:
  group: deploy-pipeline-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Pipeline Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: "access_token"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/compute-engine
          file: apps/compute-engine/Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/pipeline-worker:${{ github.sha }}
            ${{ env.REGISTRY }}/pipeline-worker:latest
          cache-from: type=gha,scope=pipeline-worker
          cache-to: type=gha,mode=max,scope=pipeline-worker

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/pipeline-worker:${{ github.sha }}
          flags: |
            --set-cloudsql-instances=${{ env.CLOUDSQL_INSTANCE }}
            --set-env-vars=INSTANCE_CONNECTION_NAME=${{ env.CLOUDSQL_INSTANCE }}
            --set-secrets=DB_USER=NOOP_DB_USER:latest,DB_PASSWORD=NOOP_DB_PASSWORD:latest,DB_NAME=NOOP_DB_NAME:latest
            --service-account=noop-cloud-run@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
            --min-instances=0
            --max-instances=5
            --memory=4Gi
            --cpu=2
            --concurrency=10
            --timeout=1800
            --allow-unauthenticated

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "::notice title=Pipeline Worker Deployed::$URL"
