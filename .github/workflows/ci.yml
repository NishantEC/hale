name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter app run compile
      - run: pnpm --filter app run test

  rust:
    name: Compute engine (fmt + clippy + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/compute-engine
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/compute-engine
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features

  audit:
    name: Compute engine (cargo audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/compute-engine
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Fail on actual vulnerabilities; report (don't fail on) unmaintained/yanked advisories.
      - run: cd apps/compute-engine && cargo audit --ignore RUSTSEC-2023-0071
