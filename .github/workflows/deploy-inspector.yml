name: Deploy Inspector

on:
  push:
    tags:
      - "inspector-v*"
  workflow_dispatch:

env:
  PROJECT_ID: flashckard
  REGION: us-central1
  SERVICE: noop-inspector
  REGISTRY: us-central1-docker.pkg.dev/flashckard/noop
  VITE_API_BASE_URL: https://api.noop.enform.co

concurrency:
  group: deploy-inspector-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Inspector
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: "access_token"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/inspector/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/inspector:${{ github.sha }}
            ${{ env.REGISTRY }}/inspector:latest
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
          cache-from: type=gha,scope=inspector
          cache-to: type=gha,mode=max,scope=inspector

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/inspector:${{ github.sha }}
          flags: |
            --service-account=noop-cloud-run@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
            --min-instances=0
            --cpu-boost
            --max-instances=5
            --memory=256Mi
            --cpu=1
            --allow-unauthenticated

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "::notice title=Inspector Deployed::$URL"
